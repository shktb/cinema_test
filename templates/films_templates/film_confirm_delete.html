{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-warning">
        <h3>Удаление фильма</h3>
        <p>Вы уверены, что хотите безвозвратно удалить фильм <strong>"{{ object.name }}"</strong>?</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Подтвердить удаление</button>
            <a href="{% url 'film_detail' film_id=object.id %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>

{% endblock %}
