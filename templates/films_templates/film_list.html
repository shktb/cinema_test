{% extends 'base.html' %}

{% block content %}
{% for film in list %}
    
<div class="card mb-3" style="max-width: 540px;">
  <div class="row g-0">
    <div class="col-md-4">
      {% if film.image %}
    <img src="{{ film.image.url }}" class="card-img-top" alt="...">
    {% else %}
    <img src="/media/empty_image.png" class="card-img-top" alt="...">
    {% endif %}
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <h5 class="card-title">{{ film.name }}</h5>
        <p class="card-text">Описание: {{ film.descriptions }}</p>
        <p class="card-text"><small class="text-body-secondary">Год: {{ film.year }}</small></p>
        <a href="/film/{{film.id}}/" class="btn btn-primary">Посмотреть</a>
      </div>
    </div>
  </div>
</div>
{% endfor %}
{% endblock %}
